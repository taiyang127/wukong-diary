<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>悟空日记</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&display=swap');

:root {
  --bg: #0a0400;
  --bg2: #120800;
  --paper: #f2e6c8;
  --paper-line: rgba(160,120,50,.14);
  --ink: #1a0c00;
  --red: #a8301a;
  --gold: #c49010;
  --gold2: #e0aa28;
  --gold-dim: #7a5808;
  --border: rgba(180,130,30,.18);
  --border-bright: rgba(180,130,30,.45);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; background:#0a0400; }

body {
  background: #0a0400;
  min-height: 100vh;
  font-family: 'Noto Serif SC', serif;
  color: var(--ink);
}

/* ─── HERO ─── */
.hero {
  text-align: center;
  padding: 56px 20px 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(160,90,0,.12), transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-block;
  border: none;
  color: var(--gold-dim);
  font-size: .68rem;
  letter-spacing: .6em;
  padding: 0;
  margin-bottom: 22px;
}
.hero-title {
  font-size: clamp(2.4rem, 8vw, 5rem);
  font-weight: 900;
  color: #e0aa28;
  letter-spacing: .2em;
  display: block;
  text-shadow: none;
  -webkit-text-stroke: 0;
  line-height: 1;
}
.hero-sub {
  display: block;
  font-size: .8rem;
  color: #a08030;
  letter-spacing: .5em;
  margin-top: 14px;
  opacity: .8;
}
.hero-deco {
  display: flex; align-items: center; justify-content: center;
  gap: 18px; margin: 16px auto 0; max-width: 300px;
}
.hero-deco hr { flex:1; border:none; border-top:1px solid #4a2c08; }
.hero-deco span { color: var(--red); font-size: 1rem; opacity: .7; }

.hero-desc {
  max-width: 520px;
  margin: 24px auto 0;
  color: #7a5820;
  font-size: .82rem;
  line-height: 1.9;
  letter-spacing: .05em;
}

/* ─── MAIN ─── */
.main {
  max-width: 780px;
  margin: 0 auto;
  padding: 8px 16px 80px;
}

/* ─── CHAPTER ACCORDION ─── */
.chapter {
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  transition: border-color .25s;
}
.chapter.open { border-color: var(--border-bright); }

.chapter-header {
  display: flex;
  align-items: center;
  gap: 0;
  cursor: pointer;
  padding: 0;
  background: linear-gradient(135deg, rgba(30,14,0,.95), rgba(18,8,0,.98));
  user-select: none;
  transition: background .2s;
}
.chapter-header:hover { background: linear-gradient(135deg, rgba(44,22,0,.95), rgba(28,12,0,.98)); }
.chapter.open .chapter-header { background: linear-gradient(135deg, rgba(60,28,0,.98), rgba(35,15,0,.98)); }

.ch-num {
  width: 56px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 18px 0;
  border-right: 1px solid var(--border);
  color: var(--gold-dim);
}
.ch-num-label { font-size: .58rem; letter-spacing: .2em; opacity: .7; }
.ch-num-n { font-size: 1.3rem; font-weight: 700; line-height: 1; color: var(--gold); }

.ch-info { flex:1; padding: 14px 18px; min-width: 0; }
.ch-title-cn {
  font-size: clamp(.72rem, 1.8vw, .96rem);
  font-weight: 700;
  color: #d8b060;
  letter-spacing: .04em;
  line-height: 1.45;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ch-meta {
  margin-top: 5px;
  display: flex; gap: 14px; flex-wrap: wrap;
}
.ch-count {
  font-size: .68rem;
  color: var(--gold-dim);
  letter-spacing: .1em;
}

.ch-arrow {
  width: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold-dim);
  font-size: .75rem;
  transition: transform .3s, color .2s;
}
.chapter.open .ch-arrow { transform: rotate(180deg); color: var(--gold); }

/* ─── ENTRY LIST ─── */
.entry-list {
  display: none;
  background: #1e0e02;
  border-top: 1px solid var(--border);
}
.chapter.open .entry-list { display: block; }

.entry-item {
  border-bottom: 1px solid rgba(100,60,10,.15);
  cursor: pointer;
}
.entry-item:last-child { border-bottom: none; }

.entry-header {
  display: flex; align-items: center; gap: 0;
  padding: 0;
  transition: background .15s;
}
.entry-header:hover { background: rgba(180,130,20,.06); }
.entry-item.open .entry-header { background: rgba(180,130,20,.04); }

.entry-dot-wrap {
  width: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 16px 0;
}
.entry-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #3a2008;
  transition: background .2s, box-shadow .2s;
}
.entry-item.open .entry-dot,
.entry-header:hover .entry-dot {
  background: var(--gold);
  box-shadow: 0 0 6px rgba(200,150,10,.5);
}

.entry-info { flex:1; padding: 14px 14px 14px 0; }
.entry-title-text {
  font-size: .88rem;
  color: #d4a844;
  line-height: 1.45;
  letter-spacing: .04em;
  transition: color .15s;
}
.entry-header:hover .entry-title-text,
.entry-item.open .entry-title-text { color: #f0cc60; }

.entry-date-text {
  font-size: .65rem;
  color: #8a5e28;
  margin-top: 3px;
  letter-spacing: .08em;
}

.entry-arrow {
  width: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #4a2808; font-size: .65rem;
  transition: transform .25s, color .15s;
}
.entry-item.open .entry-arrow { transform: rotate(180deg); color: var(--gold); }

/* ─── DIARY CONTENT ─── */
.diary-content {
  display: none;
  padding: 0 20px 20px 44px;
}
.entry-item.open .diary-content { display: block; }

.diary-paper {
  background: var(--paper);
  background-image: repeating-linear-gradient(
    transparent, transparent 30px,
    var(--paper-line) 30px, var(--paper-line) 31px
  );
  border-radius: 2px;
  padding: 28px 32px 24px 34px;
  position: relative;
  box-shadow: 0 4px 24px rgba(0,0,0,.45), 2px 2px 0 #6a3c08;
}
.diary-paper::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, transparent, var(--red) 8%, var(--red) 92%, transparent);
  opacity: .5;
}
.diary-paper::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 50%);
  pointer-events: none;
}

.dp-date {
  font-size: .7rem; color: var(--red);
  letter-spacing: .2em; margin-bottom: 4px; opacity: .8;
}
.dp-title {
  font-size: .98rem; font-weight: 700; color: var(--ink);
  letter-spacing: .06em; line-height: 1.5;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(150,100,30,.2);
}
.dp-body {
  font-size: .9rem; line-height: 2.1; color: #1a0a00;
}
.dp-body p { text-indent: 2em; margin-bottom: .7em; }
.dp-body p:last-child { margin-bottom: 0; }
.dp-mood {
  margin-top: 16px; padding-top: 12px;
  border-top: 1px dashed rgba(150,100,30,.2);
  font-size: .8rem; color: var(--red);
  letter-spacing: .06em; font-style: normal;
}
.dp-sig {
  margin-top: 14px; text-align: right;
  color: var(--gold); font-size: .76rem;
  font-weight: 600; letter-spacing: .15em; opacity: .65;
}

/* binding holes on paper */
.dp-holes {
  position: absolute; right: -1px; top: 0; bottom: 0;
  display: flex; flex-direction: column;
  justify-content: space-evenly; padding: 16px 0;
  pointer-events: none;
}
.dp-hole {
  width: 9px; height: 9px; border-radius: 50%;
  background: rgba(8,4,0,.5);
  border: 1px solid rgba(100,60,10,.3);
  margin-right: -4px;
}

/* ─── PROGRESS ─── */
.progress-bar {
  max-width: 780px; margin: 0 auto 6px;
  padding: 0 16px;
  display: flex; align-items: center; gap: 12px;
}
.progress-label { font-size: .68rem; color: var(--gold-dim); letter-spacing: .15em; white-space: nowrap; }
.progress-track {
  flex:1; height: 3px; background: rgba(100,60,10,.2); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold2));
  border-radius: 2px;
  transition: width .4s ease;
}

@media(max-width:600px){
  .ch-num { width: 44px; }
  .diary-content { padding: 0 12px 16px 12px; }
  .diary-paper { padding: 20px 18px 18px 20px; }
}

/* ─── SCROLLING MONKEY ─── */
.scroll-monkey {
  position: fixed;
  right: 22px;
  width: 36px;
  text-align: center;
  cursor: default;
  user-select: none;
  z-index: 100;
  pointer-events: none;
}
.monkey-emoji {
  font-size: 1.8rem;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
  animation: mFloat 3s ease-in-out infinite;
}
.monkey-staff {
  display: block;
  font-size: 1rem;
  margin-top: -4px;
  opacity: .8;
  animation: mSpin 3s linear infinite;
  transform-origin: 50% 50%;
  filter: drop-shadow(0 1px 4px rgba(200,140,0,.4));
}
@keyframes mFloat {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-5px) rotate(5deg); }
}
@keyframes mSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@media(max-width:860px){ .scroll-monkey { display:none; } }
</style>
</head>
<body>

<div class="scroll-monkey" id="scrollMonkey">
  <span class="monkey-emoji">🐒</span>
  <span class="monkey-staff">🪄</span>
</div>

<div class="hero">
  <span class="hero-badge">大圣亲笔</span>
  <span class="hero-title">悟空日记</span>
  <div class="hero-deco"><hr><span>☁</span><span>🐒</span><span>☁</span><hr></div>
  <span class="hero-sub">西行游历取经日记（太阳出品）</span>
  <p class="hero-desc">俺叫孙悟空，天地所生，石中所出，花果山美猴王，曾封齐天大圣，后随唐僧西天取经，历九九八十一难，终成斗战胜佛。这本日记，是俺从出世那日起，一路走来的私人记录——学艺、闯祸、被压、取经，事无巨细，皆是俺自己的话，自己的心情，不为别人，只为自己留着看。</p>
</div>

<div class="progress-bar">
  <span class="progress-label">阅读进度</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-label" id="progressText">0 / 0</span>
</div>

<div class="main" id="main"></div>

<script>
const DATA = [
  {
    ch: 1,
    title: "灵根育孕源流出，心性修持大道生",
    entries: [
      {
        date: "混沌初开之后，不知是何年月",
        title: "仙石迸裂，俺出世了",
        mood: "浑身都是劲，这世界什么都新鲜，俺什么都想去看看",
        body: [
          "今天俺从石头里出来了。",
          "说出来可能没人信，俺本是花果山顶一块仙石所生，那石头在山顶不知待了多少万年，今日忽然迸裂，俺就这么蹦出来了。刚出来时两眼放金光，直射云霄，把玉帝都惊动了，派千里眼顺风耳来查，查完说不过是仙石所化，不足为异。",
          "不足为异。俺琢磨着这四个字，心里有点不是滋味。俺自天地精华中来，出世便有金光，玉帝那边就这么一句话打发了，连个正眼都没给。罢了，俺也不稀罕他搭理，日后有的是机会让他们见识俺。",
          "出来后跑进山涧喝了口水，凉的，比想象中好喝。山里的猴子们见俺来了，都围过来，俺也不怕生，跟他们混在一起蹦跳玩耍。这山里什么都好，什么都新奇，俺心里说不出是什么感觉，就是高兴，就是想跑，想跳，想看看这天地间所有的地方。"
        ]
      },
      {
        date: "出世后不久，某日",
        title: "跳进了瀑布，发现水帘洞，当了大王",
        mood: "说到做到，众猴拜俺，俺受之坦然，这才是俺该有的",
        body: [
          "今日做了一件大事，当了大王。",
          "事情是这样的，众猴在瀑布边玩，有猴子说谁敢钻进那瀑布里去、找到源头出来无恙，就拜他为王。众猴你看我我看你，没一个敢动。俺当时站在那里，心里想，这有什么难的，便将身一纵，跳了进去。",
          "里头别有洞天。铁板桥，石碣，上刻「花果山福地，水帘洞洞天」，里面石锅石灶石碗石盆石床石凳，宽阔得很，住多少猴子都够。俺在里头看了一圈，心里那个高兴——这不就是现成的家么？",
          "出来把里头情形一说，众猴争着跳进去看。俺坐在正中，说你们才说有本事进出无恙者拜为王，如今俺做到了，可还算数？众猴一齐叩头，叫俺大王。俺端端正正受了这一拜，心里觉得理所当然——俺本就该是这里的王。"
        ]
      },
      {
        date: "称王数百年后，某次宴席上",
        title: "正喝着酒，俺忽然就哭了",
        mood: "想到死这件事，这一夜怎么也睡不着，得去找长生之道",
        body: [
          "今日宴席上，俺莫名其妙哭了起来。",
          "众猴都慌了，问俺怎么了。俺一时也说不清，就是正喝着酒，忽然想到这日子再好，终有尽头。不管在花果山当多少年的王，不管本事有多大，阎王爷那本生死簿里有俺的名字，迟早被勾进去，一了百了。这念头一起，酒就不香了，眼泪不知不觉就落下来了。",
          "俺不是怕死，是觉得冤。俺天地所生，凭什么要受那生死的管束？那些成了仙的、成了佛的，哪个还受阎王辖制？凭什么俺不行？",
          "有个老猴说，世上只有佛仙神圣三种人不受阎王管，劝俺去寻仙访道。俺一听，立刻精神起来，拍案道：就是这个！俺明日便下山，找那仙人去！说完倒头就睡，心里反而踏实了——有了方向，死就没那么可怕了。"
        ]
      },
      {
        date: "离山之后，漂泊数载",
        title: "泛海漂洋，到了南赡部洲，寻仙不着",
        mood: "世人眼里只有名利，问到仙道个个笑俺，俺懒得跟他们计较",
        body: [
          "俺扎了个竹筏，独自下了海。",
          "到了南赡部洲，那里人多，俺一开口说猴话，众人都躲开，有的还指着俺笑。俺也不恼，跟着学说话，学走路，学那些礼仪，学了七八年，这才能与人正经交谈。可走遍了南赡部洲，问遍了各处，全是些贪名图利的凡夫俗子，哪有什么仙人踪迹。",
          "有时候俺真是心灰意冷，觉得这世上的人都活在一个小圈子里，眼睛只盯着钱财名位，说到神仙，不是笑俺痴，就是说俺妄想。俺不跟他们争，心里明白，他们见不着的东西，不代表没有。",
          "转又泛海往西牛贺洲去。寻仙的念头，一日都没淡过。"
        ]
      },
      {
        date: "西牛贺洲，又寻访数年后某日",
        title: "樵夫的歌里有仙道，顺着找到了菩提祖师",
        mood: "找了十来年，今日终于入了师门，心里那块石头落地了",
        body: [
          "今日终于找到了。",
          "俺在山里转悠，忽听林子里有人唱歌，那歌词里有仙道的意思，俺赶紧跑过去。唱歌的是个樵夫，说那歌是附近灵台方寸山斜月三星洞一位祖师教的。俺心里一跳，这么多年了，今日总算有了线索。",
          "俺道谢告别，寻山而入，果然见到洞门，石上刻着「灵台方寸山，斜月三星洞」。一个童子出来问俺是谁，俺说专程来拜师学道的，童子进去通报，出来请俺进门。",
          "见到菩提祖师，端坐台上，仙风道骨，俺一见心里就知道，这就是俺要找的人。磕了头，祖师问俺叫什么，俺说没名字，祖师想了想，给俺取名孙悟空。俺心里默念了两遍，喜欢得很。十来年漂泊，今日入了师门，有了名字，有了归处，心里那口气，总算松了。"
        ]
      },
      {
        date: "入门之后，头几年",
        title: "洒扫挑水，什么也没学到，俺只能耐着性子等",
        mood: "急也没用，先老实待着，俺等得起",
        body: [
          "入了门，祖师安排俺跟众师兄一起，每天扫地挑水种菜劈柴。祖师讲法俺就坐在下头听，讲的都是些修身养性的话，离俺想要的长生变化之法差得远。",
          "俺不敢贸然开口，怕说错了被撵出去。这里是俺找了十来年才找到的地方，俺不能鲁莽。",
          "师兄弟里有几个入门早，偶尔在俺面前显摆，俺也不理他们。这些人学了点皮毛就沾沾自喜，格局太小。俺要学的不是这些，俺等的是祖师开口传俺真本事那一天。",
          "俺告诉自己，等得起，别急。只是夜里躺着，有时会想，这一天到底什么时候来？"
        ]
      },
      {
        date: "入门三四年后，祖师讲法毕",
        title: "祖师问想学什么，俺说了几样，件件被否，最后挨了三下戒尺",
        mood: "那三下不是骂俺，祖师是在告诉俺今晚去找他，俺明白",
        body: [
          "今日祖师讲完法，忽然点了俺的名，问俺想学什么道。俺心想机会来了，说只要能长生的什么都学。",
          "祖师说术字门如何，俺问能长生不，祖师摇头。俺说流字门，祖师说也不行。俺说静字门，也不行。俺说动字门，七十二变那种，祖师还是说不行。",
          "俺急了，从位子上跳起来，问那到底学什么才能长生。祖师走下来，拿戒尺在俺脑袋上打了三下，背手走进里屋，把门关上。众师兄弟来埋怨俺冲撞了祖师，俺没搭理他们。",
          "俺心里早就明白了——三下，是叫俺三更时去；背手关门，是叫俺走后门。祖师这是要私下传俺。俺忍着笑，装出一副受了委屈的样子，等着夜深。"
        ]
      },
      {
        date: "是夜三更，洞中后房",
        title: "后门入内，祖师传了七十二变和筋斗云",
        mood: "七年等候，一夜全得，这辈子最高兴的一夜",

function updateProgress() {
  const pct = totalEntries ? Math.round(readEntries.size / totalEntries * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = readEntries.size + ' / ' + totalEntries;
}

function buildPage() {
  const main = document.getElementById('main');
  DATA.forEach(chData => {
    const chEl = document.createElement('div');
    chEl.className = 'chapter';
    chEl.id = 'ch-' + chData.ch;

    // chapter header
    const header = document.createElement('div');
    header.className = 'chapter-header';
    header.innerHTML = `
      <div class="ch-num">
        <span class="ch-num-label">第</span>
        <span class="ch-num-n">${chData.ch}</span>
        <span class="ch-num-label">回</span>
      </div>
      <div class="ch-info">
        <div class="ch-title-cn">${chData.title}</div>
        <div class="ch-meta">
          <span class="ch-count">共 ${chData.entries.length} 篇日记</span>
        </div>
      </div>
      <div class="ch-arrow">▼</div>
    `;
    header.addEventListener('click', () => toggleChapter(chData.ch, chEl));
    chEl.appendChild(header);

    // entry list
    const entryList = document.createElement('div');
    entryList.className = 'entry-list';

    chData.entries.forEach((entry, ei) => {
      const entryKey = chData.ch + '-' + ei;
      const entryEl = document.createElement('div');
      entryEl.className = 'entry-item';
      entryEl.id = 'entry-' + entryKey;

      const entryHeader = document.createElement('div');
      entryHeader.className = 'entry-header';
      entryHeader.innerHTML = `
        <div class="entry-dot-wrap"><div class="entry-dot"></div></div>
        <div class="entry-info">
          <div class="entry-title-text">${entry.title}</div>
          <div class="entry-date-text">${entry.date}</div>
        </div>
        <div class="entry-arrow">▼</div>
      `;
      entryHeader.addEventListener('click', () => toggleEntry(entryKey, entryEl, entry));
      entryEl.appendChild(entryHeader);

      // diary content (hidden)
      const content = document.createElement('div');
      content.className = 'diary-content';
      const paras = entry.body.map(p => `<p>${p}</p>`).join('');
      content.innerHTML = `
        <div class="diary-paper">
          <div class="dp-holes">
            <div class="dp-hole"></div><div class="dp-hole"></div>
            <div class="dp-hole"></div><div class="dp-hole"></div>
          </div>
          <div class="dp-date">${entry.date}</div>
          <div class="dp-title">【${entry.title}】</div>
          <div class="dp-body">${paras}</div>
          <div class="dp-mood">今日心情：${entry.mood}</div>
          <div class="dp-sig">— 齐天大圣孙悟空 亲笔</div>
        </div>
      `;
      entryEl.appendChild(content);
      entryList.appendChild(entryEl);
    });

    chEl.appendChild(entryList);
    main.appendChild(chEl);
  });

  updateProgress();
}

function toggleChapter(chNum, chEl) {
  const isOpen = openChapters.has(chNum);
  if (isOpen) {
    openChapters.delete(chNum);
    chEl.classList.remove('open');
  } else {
    openChapters.add(chNum);
    chEl.classList.add('open');
  }
}

function toggleEntry(key, entryEl, entry) {
  const isOpen = openEntries.has(key);
  if (isOpen) {
    openEntries.delete(key);
    entryEl.classList.remove('open');
  } else {
    openEntries.add(key);
    entryEl.classList.add('open');
    readEntries.add(key);
    updateProgress();
  }
}

buildPage();

// ── Monkey follows scroll ──
(function(){
  const monkey = document.getElementById('scrollMonkey');
  const docH = () => document.documentElement.scrollHeight - window.innerHeight;
  function updateMonkey(){
    const scrolled = window.scrollY;
    const total = docH();
    const pct = total > 0 ? scrolled / total : 0;
    // map scroll 0→1 to top 8%→90% of viewport
    const topPct = 8 + pct * 82;
    monkey.style.top = topPct + 'vh';
  }
  updateMonkey();
  window.addEventListener('scroll', updateMonkey, { passive: true });
})();
</script>
